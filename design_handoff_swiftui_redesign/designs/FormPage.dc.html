<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%;height:100%;background:#fff;--acc:{{accent}};display:flex;flex-direction:column;padding:22px 24px;box-sizing:border-box;font-family:Helvetica,Arial,sans-serif;color:#232323;overflow:hidden">

  <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.5px solid #232323;padding-bottom:6px;margin-bottom:9px">
    <div>
      <div style="font:700 18px/1 Helvetica">Form 1040</div>
      <div style="font:700 6.5px/1.2 Helvetica;color:#444;margin-top:3px;letter-spacing:.5px">U.S. INDIVIDUAL INCOME TAX RETURN</div>
    </div>
    <div style="font:700 15px/1 Helvetica;border:1.5px solid #232323;padding:4px 7px">2025</div>
  </div>

  <div style="font:700 6.5px/1 Helvetica;color:#333;letter-spacing:.4px;margin-bottom:4px">TAXPAYER</div>
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <div style="flex:1"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">FIRST NAME</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
    <div style="flex:1"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">LAST NAME</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
    <div style="width:96px"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">SOCIAL SECURITY NO.</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:8px">
    <div style="flex:1.6"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">HOME ADDRESS</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
    <div style="flex:1"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">CITY</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
    <div style="width:38px"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">STATE</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
    <div style="width:52px"><div style="font:600 5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:2px">ZIP</div><div style="height:15px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div></div>
  </div>

  <div style="font:700 6.5px/1 Helvetica;color:#333;letter-spacing:.4px;margin:2px 0 5px">FILING STATUS</div>
  <div style="display:flex;gap:16px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border:1.2px solid #444;border-radius:1px"></div><span style="font:400 7px Helvetica">Single</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border:1.2px solid #444;border-radius:1px"></div><span style="font:400 7px Helvetica">Married filing jointly</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:9px;height:9px;border:1.2px solid #444;border-radius:1px"></div><span style="font:400 7px Helvetica">Head of household</span></div>
  </div>

  <div style="font:700 8px/1 Helvetica;color:#232323;border-top:1px solid #ccc;padding-top:7px;margin-bottom:6px">Income</div>
  <sc-for list="{{ incomeLines }}" as="ln" hint-placeholder-count="4">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="font:400 7px Helvetica;color:#333;white-space:nowrap">{{ ln.label }}</span>
      <div style="flex:1;border-bottom:1px dotted #bbb;height:1px;transform:translateY(3px)"></div>
      <div style="width:84px;height:14px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:2px"></div>
    </div>
  </sc-for>

  <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
    <span style="font:700 7.5px Helvetica;color:#232323;white-space:nowrap">9&nbsp;&nbsp;This is your total income</span>
    <div style="flex:1;border-bottom:1px dotted #bbb;height:1px;transform:translateY(3px)"></div>
    <div style="width:84px;height:16px;border:1.4px solid var(--acc);background:color-mix(in srgb,var(--acc) 16%,#fff);border-radius:2px"></div>
  </div>

  <div style="margin-top:auto;padding-top:11px;border-top:1.5px solid #232323;display:flex;gap:10px;align-items:flex-end">
    <div style="flex:1">
      <div style="font:700 6px/1 Helvetica;color:#333;letter-spacing:.4px;margin-bottom:3px">SIGN HERE</div>
      <div style="height:28px;border-radius:6px;background:#e8b45a;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 3px 8px -2px rgba(232,180,90,.7)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4a3200" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5a2 2 0 0 0-3-3L5 17z"/></svg>
        <span style="font:700 9px system-ui;color:#4a3200">Sign here</span>
      </div>
    </div>
    <div style="width:104px">
      <div style="font:600 5.5px/1 Helvetica;color:#777;letter-spacing:.4px;margin-bottom:3px">DATE</div>
      <div style="height:28px;border:1px solid var(--acc);background:color-mix(in srgb,var(--acc) 12%,#fff);border-radius:3px"></div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:468,&quot;height&quot;:606},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#37c07a&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      accent: this.props.accent || '#37c07a',
      incomeLines: [
        { label: '1a  Total wages from Form(s) W-2' },
        { label: '2b  Taxable interest' },
        { label: '3b  Ordinary dividends' },
        { label: '7   Capital gain or (loss)' },
      ],
    };
  }
}
</script>
</body>
</html>
