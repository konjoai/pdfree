# cargo-deny configuration — Konjo Quality Framework
#
# Schema targets modern cargo-deny (0.19+): the old per-category severity
# knobs in [licenses] (copyleft/unlicensed) and [advisories]
# (vulnerability/unmaintained/notice) were removed upstream — licenses are
# allow-list-only now, and vulnerabilities/yanked crates are denied by
# default. Using the removed keys makes cargo-deny refuse to parse this file
# at all ("unexpected-value" / unknown field) rather than degrade gracefully.
[licenses]
allow = ["MIT","Apache-2.0","Apache-2.0 WITH LLVM-exception","BSD-2-Clause","BSD-3-Clause","ISC","Unicode-DFS-2016","CC0-1.0","Zlib","OpenSSL"]
confidence-threshold = 0.8
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
