# templates/repo-ci.yml
# The thin per-repo GitHub Actions workflow a consuming repo drops in. The CI plane
# installs the pinned kiban distribution and runs konjo-gates against the repo's profile.
# CI never reads ~/.konjo; the gate logic and the eval cassettes come from the installed,
# version-pinned package. The self_test gate runs the eval through the deterministic
# replay backend, so CI needs no model and no network for it.
#
# Pin KIBAN_REF to a tag or sha so a kiban change rolls out to this repo on a deliberate
# schedule, not all repos at once.
#
# The `lang/rust` pack's repo-native gates (repo:fmt-check, repo:clippy, repo:cargo-deny,
# repo:cargo-mutants — see .konjo/profile.yml's format_lint/contract_gates/mutation
# fields) shell out to real cargo subcommands. konjo-gates itself is pure Python and
# assumes those tools are already on PATH; this job has to provide them, same as the
# separate Wall-2 gate (.github/workflows/konjo-gate.yml) does for its own jobs — the
# two workflows run in isolated VMs and share no state.
#
# TODO(pdfree): `continue-on-error: true` on the gates job is a deliberate, temporary
# workaround. As of KIBAN_REF v1.1.0, all four repo-native gates
# (repo:fmt-check/clippy/cargo-deny/cargo-mutants) failed instantly (~0.2s total for
# `konjo-gates` to run, even with the tools confirmed installed and on PATH) with a
# generic "net-new findings" message — see docs/kiban-investigation-handoff.md for the
# full diagnosis. Bumped to v1.1.3, which is reported to include a fix. Once a CI run on
# this ref confirms the repo:* gates pass for real (not just complete fast), remove this
# override and let `gates` block again; if it's still broken, revert the bump and keep
# waiting.

name: konjo-gates

on:
  pull_request:
  push:
    branches: [main]

env:
  KIBAN_REF: "v1.1.3"   # the pinned kiban ref for this repo; bump deliberately
  CARGO_TERM_COLOR: always

jobs:
  gates:
    runs-on: ubuntu-latest
    continue-on-error: true   # TODO(pdfree): see note above; remove once v1.1.3 is confirmed to fix repo:* gates
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # konjo-gates diffs against the base ref

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "konjo-gates-${{ github.repository }}"

      # cargo-deny and cargo-mutants are third-party subcommands; nothing installs
      # them by default. rustfmt/clippy come from the toolchain step above.
      - name: Install repo-native gate tools
        run: |
          cargo install cargo-deny --locked --quiet 2>/dev/null || true
          cargo install cargo-mutants --locked --quiet 2>/dev/null || true

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Install pinned kiban
        # Installs the whole kiban distribution at the pin. It ships the real engine
        # (lib, evals) with the konjo-gates entry point and the eval cassettes, so the
        # orchestrator imports one source of truth and the replay eval needs no model.
        run: pip install "kiban @ git+https://github.com/konjoai/kiban.git@${KIBAN_REF}"

      - name: Run gates against the repo profile
        run: konjo-gates --profile .konjo/profile.yml --base "origin/${{ github.base_ref || 'main' }}"
