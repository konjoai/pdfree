name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: rust build + test + accuracy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The workspace includes the Tauri desktop crate (pdfree-desktop), whose
      # glib/gobject/webkit -sys build scripts need these GTK dev libraries via
      # pkg-config. Required for the --workspace clippy/build/test steps below.
      - name: Install Linux GUI deps (pdfree-desktop / Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      # E2E accuracy suite (Phase 1): grade every feature against a corpus of
      # real public-domain forms and emit a reviewable report + overlay PNGs.
      # A *hard* round-trip failure fails the build; detection counts and soft
      # checks are informational. The report is uploaded for human review.
      - name: Fetch test corpus
        run: scripts/fetch-test-corpus.sh

      - name: Accuracy report
        run: cargo run --release -p pdfree-core --example accuracy_report

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: target/accuracy-report/
          if-no-files-found: warn

  macos:
    name: macOS app build + unit tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # xcodegen (brew-latest) emits a modern project format; pin to a recent
      # Xcode so `xcodebuild` can read it (the runner default can lag).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Build FFI dylib + Swift bindings
        run: scripts/build-macos.sh

      - name: Generate Xcode project
        working-directory: apps/macos
        run: xcodegen generate

      - name: Unit tests
        working-directory: apps/macos
        run: |
          xcodebuild \
            -project PDFree.xcodeproj \
            -scheme PDFreeTests \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            test

  windows:
    name: Windows desktop installer (Tauri)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Tauri ships the web frontend as its UI. tauri.conf.json's frontendDist
      # points at apps/web/dist and there is no beforeBuildCommand, so build it
      # explicitly before packaging.
      - name: Build web frontend
        working-directory: apps/web
        run: |
          npm install
          npm run build

      # Fetch pdfium.dll into vendor/pdfium/. tauri.windows.conf.json bundles it
      # as a resource and lib.rs points PDFIUM_DYNAMIC_LIB_PATH at the resource
      # dir at runtime. Git Bash on windows-latest has curl + tar.
      - name: Fetch PDFium (win-x64)
        shell: bash
        run: scripts/fetch-pdfium.sh win-x64

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build installer
        working-directory: apps/desktop
        run: tauri build

      # Workspace target dir is at the repo root; Tauri writes installers under
      # target/release/bundle/{msi,nsis}.
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdfree-windows-x64-installer
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  macos-ui:
    name: macOS UI tests (phase 2, allowed to fail)
    runs-on: macos-14
    # XCUITest driving NSOpenPanel / drag gestures is inherently flaky in
    # headless CI; kept non-blocking until it's proven stable (see
    # apps/macos/UITests). Reports status without gating the merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # xcodegen (brew-latest) emits a modern project format; pin to a recent
      # Xcode so `xcodebuild` can read it (the runner default can lag).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch PDFium
        run: scripts/fetch-pdfium.sh

      - name: Build FFI dylib + Swift bindings
        run: scripts/build-macos.sh

      - name: Generate Xcode project
        working-directory: apps/macos
        run: xcodegen generate

      - name: UI tests
        working-directory: apps/macos
        run: |
          xcodebuild \
            -project PDFree.xcodeproj \
            -scheme PDFreeUITests \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            test
